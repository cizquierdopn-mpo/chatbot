<!DOCTYPE html>
<html>
<head>
    <title>Chatbot Docker</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        #chat { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        .user { color: blue; margin: 5px 0; }
        .bot { color: green; margin: 5px 0; }
        input { width: 70%; padding: 10px; }
        button { width: 25%; padding: 10px; }
    </style>
</head>
<body>
    <h1>🤖 Chatbot con Docker</h1>
    <div id="chat"></div>
    <input type="text" id="msg" placeholder="Escribe tu mensaje...">
    <button onclick="send()">Enviar</button>

    <script>
        async function send() {
            const input = document.getElementById('msg');
            const chat = document.getElementById('chat');
            const msg = input.value;
            
            chat.innerHTML += `<div class="user">Tú: ${msg}</div>`;
            
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            });
            const data = await res.json();
            
            chat.innerHTML += `<div class="bot">Bot: ${data.response}</div>`;
            chat.scrollTop = chat.scrollHeight;
            input.value = '';
        }
    </script>
</body>
</html>
